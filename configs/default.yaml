project_name: timing_acoustic_keyboard_recognition

hardware:
  keyboard:
    computer_model: external keyboard experiment
    model_identifier: Keychron V6
    model_number: Keychron V6 wired mechanical keyboard
    chip: n/a
    memory_gb: n/a
    keyboard_type: wired mechanical keyboard
    connection: wired USB
  microphone:
    name: Scarlett Solo USB microphone/interface setup
    pattern: 360-degree/omnidirectional
    muffler: none

environment:
  room: user room
  ac_unit: off
  notes: quiet room, controlled first experiment

audio:
  sample_rate: 48000
  channels: 1
  dtype: float32

collection:
  participant_id_default: p001
  prompt_directory: prompts
  raw_session_directory: data/raw/sessions
  save_audio: true
  save_events_csv: true
  save_metadata_json: true

segmentation:
  mode: oracle
  pre_keydown_ms: 20
  post_keydown_ms: 45

neural_segmenter:
  sample_rate: 24000
  window_ms: 75
  hop_ms: 5
  min_gap_ms: 75
  threshold: 0.5
  tolerance_ms: 35
  max_peak_multiplier: 1.0
  negative_ratio: 1.5
  positive_jitters_per_event: 1
  positive_jitter_ms: 3
  negative_exclusion_ms: 45
  epochs: 25
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.01
  patience: 7
  dropout: 0.25

features:
  mel_bands: 64
  fft_window_size: 1024
  hop_length: 256

timing_features:
  dwell_time: true
  press_press_latency: true
  release_press_latency: true
  release_release_latency: true
  pause_indicators: true
  keyboard_geometry: true

experiment:
  random_seed: 42
  test_size: 0.2
  validation_size: 0.2
  first_comparison:
    - acoustic_only
    - timing_only
    - acoustic_plus_timing
